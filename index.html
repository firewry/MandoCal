<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MandoCal – Mando &amp; Grogu Countdown</title>
  <style>
    /* ── Variables ─────────────────────────────────── */
    :root {
      --bg:          #080c14;
      --bg2:         #0f1623;
      --bg3:         #161f30;
      --bg4:         #1c2840;
      --border:      #243048;
      --text:        #dde6f0;
      --text2:       #8da0b8;
      --text3:       #4e637a;
      --gold:        #c9920a;
      --gold-light:  #f0b429;

      --s1:  #3b82f6;   /* Mando S1  – blue        */
      --s2:  #a855f7;   /* Mando S2  – purple      */
      --bf:  #f59e0b;   /* Book BoBF – amber       */
      --s3:  #10b981;   /* Mando S3  – emerald     */

      --plan-bg:    rgba(59, 130, 246, 0.06);
      --today-ring: #f0b429;
      --movie-bg:   rgba(239, 68, 68, 0.15);
      --past-dim:   0.45;
    }

    /* ── Reset / Base ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    button { cursor: pointer; font-family: inherit; }

    /* ── Header ─────────────────────────────────────── */
    header {
      background: linear-gradient(160deg, #0d1828 0%, #060a10 60%);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      font-size: 2rem;
      line-height: 1;
    }
    .logo h1 {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--gold-light);
      text-shadow: 0 0 20px rgba(240,180,41,0.35);
    }
    .logo p {
      font-size: 0.75rem;
      color: var(--text2);
      margin-top: 1px;
    }
    #countdown {
      font-size: 1rem;
      color: var(--gold-light);
      background: rgba(240,180,41,0.08);
      border: 1px solid rgba(240,180,41,0.25);
      border-radius: 8px;
      padding: 7px 16px;
      white-space: nowrap;
    }

    /* ── Controls bar ───────────────────────────────── */
    .controls {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .control-group label {
      font-size: 0.8rem;
      color: var(--text2);
      white-space: nowrap;
    }
    .controls input[type="date"] {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.85rem;
      outline: none;
    }
    .controls input[type="date"]:focus {
      border-color: var(--gold);
    }
    .btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 0.82rem;
      transition: all 0.15s;
    }
    .btn:hover {
      background: var(--bg4);
      color: var(--text);
      border-color: var(--gold);
    }
    .btn-primary {
      background: rgba(240,180,41,0.12);
      border-color: rgba(240,180,41,0.35);
      color: var(--gold-light);
    }
    .btn-primary:hover {
      background: rgba(240,180,41,0.22);
    }
    .btn-danger {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.3);
      color: #f87171;
    }
    .btn-danger:hover {
      background: rgba(239,68,68,0.2);
    }

    /* ── Legend ─────────────────────────────────────── */
    .legend {
      padding: 10px 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .legend-label {
      font-size: 0.75rem;
      color: var(--text3);
      margin-right: 4px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text2);
    }
    .legend-dot {
      width: 11px;
      height: 11px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .legend-item.plan-week-indicator {
      gap: 6px;
    }
    .legend-plan-box {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      background: rgba(59,130,246,0.18);
      border: 1px solid rgba(59,130,246,0.35);
    }

    /* ── Calendars container ────────────────────────── */
    .calendars {
      padding: 20px 16px 40px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    /* ── Single month ───────────────────────────────── */
    .calendar {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      width: calc(33.333% - 14px);
      min-width: 320px;
      max-width: 480px;
      flex: 1 1 320px;
    }
    .cal-header {
      background: linear-gradient(90deg, var(--bg3), var(--bg4));
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: var(--gold-light);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }
    .cal-weekday {
      padding: 6px 2px;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    /* ── Day cells ──────────────────────────────────── */
    .day-cell {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      min-height: 80px;
      padding: 4px 5px 6px;
      position: relative;
      vertical-align: top;
      transition: background 0.1s;
    }
    .day-cell:nth-child(7n) { border-right: none; }
    .day-cell.empty {
      background: var(--bg);
      opacity: 0.4;
    }
    .day-cell.past {
      opacity: var(--past-dim);
      background: rgba(0,0,0,0.15);
    }
    .day-cell.plan-day {
      background: var(--plan-bg);
    }
    .day-cell.today {
      outline: 2px solid var(--today-ring);
      outline-offset: -2px;
      background: rgba(240,180,41,0.06);
      opacity: 1;
    }
    .day-cell.movie-day {
      background: var(--movie-bg);
    }
    .day-cell.future:not(.past):not(.today):not(.plan-day):not(.movie-day):hover {
      background: var(--bg4);
    }
    .day-cell.plan-day:not(.past):not(.today):hover {
      background: rgba(59,130,246,0.12);
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3px;
      min-height: 20px;
    }
    .day-number {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text2);
      line-height: 1;
    }
    .day-cell.today .day-number {
      color: var(--today-ring);
    }
    .day-cell.movie-day .day-number {
      color: #f87171;
    }
    .plan-indicator {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(59,130,246,0.5);
      flex-shrink: 0;
    }

    /* add-episode button on day */
    .add-ep-btn {
      background: none;
      border: 1px dashed var(--text3);
      color: var(--text3);
      border-radius: 4px;
      width: 18px;
      height: 18px;
      font-size: 0.9rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, border-color 0.15s;
    }
    .day-cell:hover .add-ep-btn,
    .add-ep-btn:focus {
      opacity: 1;
    }
    .add-ep-btn:hover {
      color: var(--gold-light);
      border-color: var(--gold-light);
    }

    /* ── Episode chips ──────────────────────────────── */
    .day-episodes { display: flex; flex-direction: column; gap: 3px; }

    .episode-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 0.7rem;
      font-weight: 600;
      line-height: 1.3;
      cursor: default;
      position: relative;
      overflow: hidden;
      gap: 3px;
      transition: filter 0.1s;
    }
    .episode-chip:hover { filter: brightness(1.15); }

    .episode-chip.mando_s1 {
      background: rgba(59,130,246,0.18);
      color: #93c5fd;
      border: 1px solid rgba(59,130,246,0.35);
    }
    .episode-chip.mando_s2 {
      background: rgba(168,85,247,0.18);
      color: #d8b4fe;
      border: 1px solid rgba(168,85,247,0.35);
    }
    .episode-chip.bobf {
      background: rgba(245,158,11,0.18);
      color: #fcd34d;
      border: 1px solid rgba(245,158,11,0.35);
    }
    .episode-chip.mando_s3 {
      background: rgba(16,185,129,0.18);
      color: #6ee7b7;
      border: 1px solid rgba(16,185,129,0.35);
    }

    .ep-label { flex: 0 0 auto; }
    .ep-title-short {
      font-size: 0.63rem;
      font-weight: 400;
      color: inherit;
      opacity: 0.75;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1 1 auto;
      min-width: 0;
    }

    .ep-delete {
      background: none;
      border: none;
      color: inherit;
      opacity: 0;
      font-size: 0.75rem;
      font-weight: 700;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: opacity 0.15s;
      border-radius: 3px;
    }
    .episode-chip:hover .ep-delete { opacity: 0.7; }
    .ep-delete:hover { opacity: 1 !important; color: #f87171; }

    /* movie badge */
    .movie-badge {
      font-size: 0.78rem;
      font-weight: 700;
      color: #f87171;
      text-align: center;
      padding: 4px 0;
    }

    /* ── Modal overlay ──────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: min(460px, 94vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg4);
    }
    .modal-header h2 { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .modal-header p  { font-size: 0.78rem; color: var(--text2); margin-top: 2px; }
    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 6px;
      width: 28px;
      height: 28px;
      font-size: 1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { color: var(--text); background: var(--bg); }

    .modal-body {
      overflow-y: auto;
      padding: 10px 14px;
      flex: 1;
    }
    .modal-section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text3);
      padding: 6px 4px 4px;
    }

    .ep-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s;
      border: 1px solid transparent;
      margin-bottom: 3px;
    }
    .ep-option:hover {
      background: var(--bg4);
      border-color: var(--border);
    }
    .ep-option .ep-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      min-width: 52px;
      text-align: center;
    }
    .ep-option.mando_s1 .ep-badge { background: rgba(59,130,246,0.2); color: #93c5fd; border: 1px solid rgba(59,130,246,0.4); }
    .ep-option.mando_s2 .ep-badge { background: rgba(168,85,247,0.2); color: #d8b4fe; border: 1px solid rgba(168,85,247,0.4); }
    .ep-option.bobf     .ep-badge { background: rgba(245,158,11,0.2); color: #fcd34d; border: 1px solid rgba(245,158,11,0.4); }
    .ep-option.mando_s3 .ep-badge { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.4); }
    .ep-option-title { font-size: 0.82rem; color: var(--text); }
    .ep-option-sub   { font-size: 0.72rem; color: var(--text2); }

    .modal-empty { padding: 24px; text-align: center; color: var(--text2); font-size: 0.85rem; }

    /* ── Progress bar ───────────────────────────────── */
    .progress-bar-section {
      padding: 10px 24px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .progress-label { font-size: 0.78rem; color: var(--text2); white-space: nowrap; }
    .progress-track {
      flex: 1 1 200px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--s1) 0%, var(--s2) 30%, var(--bf) 60%, var(--s3) 100%);
      transition: width 0.4s;
    }
    .progress-count { font-size: 0.78rem; color: var(--text3); white-space: nowrap; }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 1060px) {
      .calendar { width: 100%; max-width: 500px; }
    }

    /* ── Tooltip via title attr – use pure CSS title fallback ── */
    /* Browsers show [title] attribute as native tooltip – good enough */

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ╔══════════════╗ HEADER ╔══════════════╗ -->
<header>
  <div class="logo">
    <div class="logo-icon">🪖</div>
    <div>
      <h1>MandoCal</h1>
      <p>Mando &amp; Grogu Movie Watch Planner</p>
    </div>
  </div>
  <div id="countdown">…</div>
</header>

<!-- ╔══════════════╗ CONTROLS ╔══════════════╗ -->
<div class="controls">
  <div class="control-group">
    <label for="movie-date">🎬 Movie Date:</label>
    <input type="date" id="movie-date" min="2026-03-23" max="2026-12-31" />
  </div>
  <button class="btn btn-primary" id="auto-schedule-btn">⚡ Re-Auto-Schedule Future</button>
  <button class="btn btn-danger" id="reset-btn">↺ Reset to Default</button>
</div>

<!-- ╔══════════════╗ LEGEND + PROGRESS ╔══════════════╗ -->
<div class="progress-bar-section">
  <span class="progress-label" id="progress-label">Watched: 0 / 31</span>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <span class="progress-count" id="progress-count"></span>
</div>
<div class="legend">
  <span class="legend-label">Shows:</span>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Mandalorian S1</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>Mandalorian S2</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Book of Boba Fett</div>
  <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Mandalorian S3</div>
  <span style="margin-left:10px" class="legend-label">Days:</span>
  <div class="legend-item plan-week-indicator"><div class="legend-plan-box"></div>Plan week</div>
</div>

<!-- ╔══════════════╗ CALENDARS ╔══════════════╗ -->
<div class="calendars" id="calendars">
  <!-- March -->
  <div class="calendar">
    <div class="cal-header">March 2026</div>
    <div class="cal-weekdays">
      <div class="cal-weekday">Sun</div><div class="cal-weekday">Mon</div>
      <div class="cal-weekday">Tue</div><div class="cal-weekday">Wed</div>
      <div class="cal-weekday">Thu</div><div class="cal-weekday">Fri</div>
      <div class="cal-weekday">Sat</div>
    </div>
    <div class="cal-grid" id="calendar-2026-2"></div>
  </div>
  <!-- April -->
  <div class="calendar">
    <div class="cal-header">April 2026</div>
    <div class="cal-weekdays">
      <div class="cal-weekday">Sun</div><div class="cal-weekday">Mon</div>
      <div class="cal-weekday">Tue</div><div class="cal-weekday">Wed</div>
      <div class="cal-weekday">Thu</div><div class="cal-weekday">Fri</div>
      <div class="cal-weekday">Sat</div>
    </div>
    <div class="cal-grid" id="calendar-2026-3"></div>
  </div>
  <!-- May -->
  <div class="calendar">
    <div class="cal-header">May 2026</div>
    <div class="cal-weekdays">
      <div class="cal-weekday">Sun</div><div class="cal-weekday">Mon</div>
      <div class="cal-weekday">Tue</div><div class="cal-weekday">Wed</div>
      <div class="cal-weekday">Thu</div><div class="cal-weekday">Fri</div>
      <div class="cal-weekday">Sat</div>
    </div>
    <div class="cal-grid" id="calendar-2026-4"></div>
  </div>
</div>

<!-- ╔══════════════╗ MODAL ╔══════════════╗ -->
<div class="modal-overlay" id="modal">
  <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <div>
        <h2 id="modal-title">Add Episode</h2>
        <p id="modal-date"></p>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" id="episode-list"></div>
  </div>
</div>

  { id:'bfe1', show:'bobf', label:'BF·E1', title:'Chapter 1: Stranger in a Strange Land' },

  { id:'bfe7', show:'bobf', label:'BF·E7', title:'Chapter 7: In the Name of Honor' },
  // ── Mandalorian Season 3 ──────────────────────────────────────
  { id:'s3e1', show:'mando_s3', label:'S3·E1', title:'Chapter 17: The Apostate' },
  { id:'s3e2', show:'mando_s3', label:'S3·E2', title:'Chapter 18: The Mines of Mandalore' },
  { id:'s3e3', show:'mando_s3', label:'S3·E3', title:'Chapter 19: The Convert' },
  { id:'s3e4', show:'mando_s3', label:'S3·E4', title:'Chapter 20: The Foundling' },
  { id:'s3e5', show:'mando_s3', label:'S3·E5', title:'Chapter 21: The Pirate' },
  { id:'s3e6', show:'mando_s3', label:'S3·E6', title:'Chapter 22: Guns for Hire' },
  { id:'s3e7', show:'mando_s3', label:'S3·E7', title:'Chapter 23: The Spies' },
  { id:'s3e8', show:'mando_s3', label:'S3·E8', title:'Chapter 24: The Return' },
];
const EPISODE_MAP = Object.fromEntries(EPISODES.map(e => [e.id, e]));

/* ================================================================
   SCHEDULING HELPERS
   ================================================================ */

// Reference Friday that starts the first "plan" block
const PLAN_REF = new Date(2026, 2, 27); // March 27, 2026

/** Returns true if `date` falls inside a plan-week block.
 *  Pattern: 8-day plan (Fri–Fri) then 6-day skip (Sat–Thu), repeat.
 */
function isPlanDay(date) {
  const d = toMidnight(date);
  const diff = Math.round((d - PLAN_REF) / 86400000);
  const cycle = ((diff % 14) + 14) % 14;
  return cycle <= 7; // 0-7 = plan, 8-13 = skip
}

function toMidnight(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  return d;
}

function dateStr(date) {
  const d = new Date(date);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseDate(str) {
  // Parse YYYY-MM-DD without timezone shift
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function today() { return toMidnight(new Date()); }

/* ================================================================
   DEFAULT INITIAL SCHEDULE  (watched episodes, past dates)
   ================================================================ */
const DEFAULT_WATCHED = {
  '2026-03-16': ['s1e1'],
  '2026-03-17': ['s1e2'],
  '2026-03-18': ['s1e3'],
  '2026-03-19': ['s1e4'],
  // 3/20 = nothing watched
  '2026-03-21': ['s1e5'],
};

/* ================================================================
   STATE
   ================================================================ */
let state = {
  movieDate: '2026-05-22',
  schedule: {},   // dateStr → [episodeId, ...]
};

/* ================================================================
   STORAGE
   ================================================================ */
function saveState() {
  localStorage.setItem('mandocal_v1', JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem('mandocal_v1');
  if (raw) {
    try {
      state = JSON.parse(raw);
      return;
    } catch(e) { /* fall through */ }
  }
  // Fresh start: seed with watched episodes then auto-schedule
  state = {
    movieDate: '2026-05-22',
    schedule: { ...DEFAULT_WATCHED },
  };
  autoSchedule();
  saveState();
}

/* ================================================================
   AUTO-SCHEDULE ALGORITHM
   ================================================================ */
function autoSchedule() {
  const t = today();
  const movieDate = parseDate(state.movieDate);

  // 1. Clear all future dates (>= today)
  for (const ds of Object.keys(state.schedule)) {
    if (parseDate(ds) >= t) delete state.schedule[ds];
  }

  // 2. Determine last episode scheduled in the past
  const pastIds = [];
  // Walk past dates in order
  const pastDates = Object.keys(state.schedule)
    .filter(ds => parseDate(ds) < t)
    .sort();
  for (const ds of pastDates) {
    pastIds.push(...(state.schedule[ds] || []));
  }

  // 3. Find starting episode index
  let startIdx = 0;
  if (pastIds.length > 0) {
    const lastId = pastIds[pastIds.length - 1];
    const idx = EPISODES.findIndex(e => e.id === lastId);
    startIdx = idx >= 0 ? idx + 1 : pastIds.length;
  }
  const remaining = EPISODES.slice(startIdx);
  if (remaining.length === 0) return;

  // 4. Collect valid plan days from today until (movieDate - 1)
  const planDays = [];
  for (let d = new Date(t); d < movieDate; d.setDate(d.getDate() + 1)) {
    if (isPlanDay(new Date(d))) planDays.push(new Date(d));
  }
  if (planDays.length === 0) return;

  // 5. Fill episodes
  if (remaining.length <= planDays.length) {
    // 1 episode per day
    remaining.forEach((ep, i) => {
      state.schedule[dateStr(planDays[i])] = [ep.id];
    });
  } else {
    // 2/1 alternating (double first), starting from the beginning
    let epIdx = 0, dayIdx = 0, doDouble = true;
    while (epIdx < remaining.length && dayIdx < planDays.length) {
      const count = doDouble ? 2 : 1;
      const ds = dateStr(planDays[dayIdx]);
      state.schedule[ds] = [];
      for (let k = 0; k < count && epIdx < remaining.length; k++) {
        state.schedule[ds].push(remaining[epIdx++].id);
      }
      dayIdx++;
      doDouble = !doDouble;
    }
  }
}

/* ================================================================
   RENDERING
   ================================================================ */
function renderAll() {
  renderCountdown();
  renderProgress();
  renderCalendar(2026, 2); // March  (month index 2)
  renderCalendar(2026, 3); // April  (month index 3)
  renderCalendar(2026, 4); // May    (month index 4)
}

function renderCountdown() {
  const movie = parseDate(state.movieDate);
  const now   = today();
  const diff  = Math.round((movie - now) / 86400000);
  const el    = document.getElementById('countdown');
  if (diff > 0)      el.textContent = `🎬 ${diff} day${diff === 1 ? '' : 's'} until Mando & Grogu`;
  else if (diff === 0) el.textContent = '🎬 Movie Day! This is the Way!';
  else                 el.textContent = '🎬 The movie has premiered!';
}

function renderProgress() {
  const total     = EPISODES.length;
  const allIds    = Object.values(state.schedule).flat();
  const t         = today();
  const watchedIds = [];
  for (const ds of Object.keys(state.schedule).sort()) {
    if (parseDate(ds) < t) watchedIds.push(...(state.schedule[ds] || []));
  }
  const watched   = watchedIds.length;
  const pct       = Math.round((watched / total) * 100);
  document.getElementById('progress-label').textContent = `Watched: ${watched} / ${total}`;
  document.getElementById('progress-fill').style.width  = pct + '%';
  const remaining = total - watched;
  const scheduled = allIds.filter(id => !watchedIds.includes(id)).length;
  document.getElementById('progress-count').textContent =
    `${remaining} remaining · ${scheduled} scheduled`;
}

function renderCalendar(year, month) {
  const grid = document.getElementById(`calendar-${year}-${month}`);
  if (!grid) return;
  const t         = today();
  const firstDay  = new Date(year, month, 1);
  const totalDays = new Date(year, month + 1, 0).getDate();
  const movieDs   = state.movieDate;

  let html = '';

  // Leading empty cells
  for (let i = 0; i < firstDay.getDay(); i++) {
    html += '<div class="day-cell empty"></div>';
  }

  for (let d = 1; d <= totalDays; d++) {
    const date = new Date(year, month, d);
    const ds   = dateStr(date);
    const isPast     = date < t;
    const isToday    = ds === dateStr(t);
    const isMovieDay = ds === movieDs;
    const isPlan     = isPlanDay(date) && !isPast && !isMovieDay;

    const episodes   = state.schedule[ds] || [];

    // Cell classes
    let cls = 'day-cell';
    if (isPast)     cls += ' past';
    if (isToday)    cls += ' today';
    if (isMovieDay) cls += ' movie-day';
    if (isPlan)     cls += ' plan-day';
    if (!isPast && !isMovieDay) cls += ' future';

    // Episode chips
    let chipsHtml = '';
    for (const epId of episodes) {
      const ep = EPISODE_MAP[epId];
      if (!ep) continue;
      const delBtn = (!isPast && !isMovieDay)
        ? `<button class="ep-delete" data-date="${ds}" data-ep="${epId}" aria-label="Remove ${ep.label}" title="Remove">✕</button>`
        : '';
      chipsHtml += `
        <div class="episode-chip ${ep.show}" title="${ep.title}">
          <span class="ep-label">${ep.label}</span>
          <span class="ep-title-short">${ep.title.replace(/^Chapter \d+: /, '')}</span>
          ${delBtn}
        </div>`;
    }

    // Movie day gets special badge
    if (isMovieDay) {
      chipsHtml = '<div class="movie-badge">🪖 Mando &amp; Grogu 🎬</div>';
    }

    // Add-episode button (only on future, non-movie days)
    const addBtn = (!isPast && !isMovieDay)
      ? `<button class="add-ep-btn" data-date="${ds}" title="Add episode" aria-label="Add episode to ${ds}">+</button>`
      : '';

    // Plan-week dot
    const planDot = isPlan ? '<span class="plan-indicator" title="Plan week"></span>' : '';

    html += `
      <div class="${cls}" data-date="${ds}">
        <div class="day-header">
          <span class="day-number">${d}</span>
          <div style="display:flex;align-items:center;gap:4px">${planDot}${addBtn}</div>
        </div>
        <div class="day-episodes">${chipsHtml}</div>
      </div>`;
  }

  grid.innerHTML = html;
}

/* ================================================================
   MODAL
   ================================================================ */
let selectedDate = null;

function openModal(ds) {
  selectedDate = ds;
  // Compute already-scheduled episode IDs (across all dates)
  const alreadyScheduled = new Set(Object.values(state.schedule).flat());
  const available = EPISODES.filter(ep => !alreadyScheduled.has(ep.id));

  const dateLabel = parseDate(ds).toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
  document.getElementById('modal-date').textContent = dateLabel;

  const list = document.getElementById('episode-list');
  if (available.length === 0) {
    list.innerHTML = '<div class="modal-empty">🎉 All episodes are already scheduled!</div>';
  } else {
    // Group by show
    const groups = [
      { key: 'mando_s1', label: 'The Mandalorian — Season 1' },
      { key: 'mando_s2', label: 'The Mandalorian — Season 2' },
      { key: 'bobf',     label: 'The Book of Boba Fett' },
      { key: 'mando_s3', label: 'The Mandalorian — Season 3' },
    ];
    let html = '';
    for (const g of groups) {
      const eps = available.filter(e => e.show === g.key);
      if (eps.length === 0) continue;
      html += `<div class="modal-section-label">${g.label}</div>`;
      for (const ep of eps) {
        html += `
          <div class="ep-option ${ep.show}" data-ep="${ep.id}" role="button" tabindex="0" title="Add ${ep.label}">
            <span class="ep-badge">${ep.label}</span>
            <div>
              <div class="ep-option-title">${ep.title}</div>
            </div>
          </div>`;
      }
    }
    list.innerHTML = html;
  }

  document.getElementById('modal').classList.add('open');
  document.getElementById('modal').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  selectedDate = null;
}

/* ================================================================
   EVENT DELEGATION
   ================================================================ */
document.getElementById('calendars').addEventListener('click', e => {
  // Delete episode
  const del = e.target.closest('.ep-delete');
  if (del) {
    const { date, ep } = del.dataset;
    if (!state.schedule[date]) return;
    state.schedule[date] = state.schedule[date].filter(id => id !== ep);
    if (state.schedule[date].length === 0) delete state.schedule[date];
    saveState();
    renderAll();
    return;
  }
  // Add episode
  const add = e.target.closest('.add-ep-btn');
  if (add) {
    openModal(add.dataset.date);
  }
});

document.getElementById('episode-list').addEventListener('click', e => {
  const opt = e.target.closest('.ep-option[data-ep]');
  if (!opt || !selectedDate) return;
  const epId = opt.dataset.ep;
  if (!state.schedule[selectedDate]) state.schedule[selectedDate] = [];
  if (!state.schedule[selectedDate].includes(epId)) {
    state.schedule[selectedDate].push(epId);
  }
  saveState();
  renderAll();
  closeModal();
});

document.getElementById('episode-list').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    const opt = e.target.closest('.ep-option[data-ep]');
    if (opt) opt.click();
  }
});

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ================================================================
   CONTROLS
   ================================================================ */
document.getElementById('movie-date').addEventListener('change', function () {
  state.movieDate = this.value;
  autoSchedule();
  saveState();
  renderAll();
});

document.getElementById('auto-schedule-btn').addEventListener('click', () => {
  autoSchedule();
  saveState();
  renderAll();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('Reset to the default schedule? This will clear all manual changes.')) return;
  localStorage.removeItem('mandocal_v1');
  state = {
    movieDate: '2026-05-22',
    schedule: { ...DEFAULT_WATCHED },
  };
  autoSchedule();
  saveState();
  document.getElementById('movie-date').value = state.movieDate;
  renderAll();
});

/* ================================================================
   INIT
   ================================================================ */
loadState();
document.getElementById('movie-date').value = state.movieDate;
renderAll();

// Live countdown tick every minute
setInterval(() => { renderCountdown(); }, 60000);
</script>
