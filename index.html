<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MandoCal Planner</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-left">
        <div class="menu-btn" id="menu-btn" title="Main menu">
          <svg focusable="false" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="#e8eaed"></path></svg>
        </div>
        <div class="logo-area">
          <div class="logo-text">Mando<span style="color:#33b679">Cal</span></div>
        </div>
        <div class="calendar-nav">
          <button id="today-btn">Today</button>
          <div class="nav-buttons">
            <button id="prev-month" title="Previous month">
              <svg focusable="false" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" fill="#e8eaed"></path></svg>
            </button>
            <button id="next-month" title="Next month">
              <svg focusable="false" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z" fill="#e8eaed"></path></svg>
            </button>
          </div>
          <h2 id="current-month-display">March 2026</h2>
        </div>
      </div>
      
      <div class="header-right">
        <!-- Removed per user request, kept for thickness reference -->
      </div>
    </header>

    <div class="main-content">
      <aside class="sidebar" id="sidebar">
        <div class="mini-calendar">
          <div class="mini-cal-header">
            <span id="mini-month-display">March 2026</span>
            <div class="mini-nav">
              <span id="mini-prev">&lt;</span><span id="mini-next">&gt;</span>
            </div>
          </div>
          <div class="mini-cal-dow">
            <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
          </div>
          <div class="mini-cal-grid" id="mini-cal-grid">
            <!-- Generated by JS -->
          </div>
        </div>

        <div class="calendars-list">
          <div class="cal-section">
            <div class="cal-section-header">
              <span>My series</span>
              <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z" fill="#e8eaed"></path></svg>
            </div>
            <div class="cal-items">
              <label class="cal-item"><input type="checkbox" id="chk-s1" checked style="accent-color: #039be5"> <span>Mandalorian S1</span></label>
              <label class="cal-item"><input type="checkbox" id="chk-s2" checked style="accent-color: #8e24aa"> <span>Mandalorian S2</span></label>
              <label class="cal-item"><input type="checkbox" id="chk-bobf" checked style="accent-color: #f09300"> <span>Book of Boba Fett</span></label>
              <label class="cal-item"><input type="checkbox" id="chk-s3" checked style="accent-color: #33b679"> <span>Mandalorian S3</span></label>
            </div>
          </div>
        </div>
      </aside>

      <main class="calendar-area">
        <div class="calendar-header">
          <div><span class="dow-text">SUN</span></div>
          <div><span class="dow-text">MON</span></div>
          <div><span class="dow-text">TUE</span></div>
          <div><span class="dow-text">WED</span></div>
          <div><span class="dow-text">THU</span></div>
          <div><span class="dow-text">FRI</span></div>
          <div><span class="dow-text">SAT</span></div>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
      </main>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
